<html data-theme = "dark">
    <head>
        <title> Typing test By tanvi</title>
        <link rel = "preconnect" href = "https://fonts.googleapis.com">
        <link rel = "preconnect" href = "https://fonts.gstatic.com" crossorigin>
        <link href = "https://"fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family="JetBrains+Mono:wght@400;600&display=swap" rel = "stylesheet">

        <style>
            :root{
                --bg: #0f0f13;
                --surface : #16161d;
                --surface2: #1e1e28;
                --border: rgba(255,255,255,0.08);
                --text : #e8e6f0;
                --muted: #7a7890;
                --faint: #3a3850;
                --accent: #7c6fff;
                --accent-glow: rgba(124,111,255,0.25);
                --green: #4ade80;
                --red: #f87171;
                --yellow: #fbbf24;
                --font-body: 'Space Grotesk', sans-serif;
                --font-mono: 'JetBrains Mono' monospace;
            }
            [data-theme="light"]{
                --bg : #f5f4f9;
                --surface: #ffffff;
                --surface2 : #eeedf6;
                --border: rgba(0,0,0,0.08);
                --text: #1a1828;
                --muted: #6b6880;
                --faint: #c8c6d8;
                --accent: #5b4ef0;
                --accent-glow: rgba(91,78,240,0.15);
            }
            *,*::before, *::after{
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html{
                font-size: 16px;
                scroll-behavior: smooth;
            }

            body{
                font-family: var(--font-body);
                background: var(--bg);
                color: var(--text);
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 2rem 1rem 4rem;
                transition: background 0.3s, color 0.3s;

            }
            .header{
                width: 100%;
                max-width: 860px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2.5rem;
            }
        </style>
    </head>
    <body>
        <!--header yahan haiii-->
        <header class = "header">
            <div class = "logo">
                <div class = "logo-icon"> </div>
                Typing Test
            </div>
            <button class = "theme-btn" id = "theme-toggle" aria-label ="Toggle Theme">🌙</button>
        </header>

        <!--Progess bar idhar se shuru hai -->
        <div class = "progress-wrap">
            <div class = "progress-bar" id = "progress-bar"></div>
        </div>

        <!--Stats idhar dikhenge -->
        <div class = "stats-bar">

            <div class = "stat-card">
                <div class = "stat-value" id = "wpm-val">0</div>    
                <div class = "stat-label ">WPM</div>
            </div>

            <div class = "stat-card">
                <div class = "stat-value" id = "acc-val">0%</div>    
                <div class = "stat-label ">Accuracy</div>
            </div>
            <div class = "stat-card">
                <div class = "stat-value" id = "chars-val">0</div>    
                <div class = "stat-label ">Characters</div>
            </div>

            <div class = "stat-card">
                <div class = "timer-ring-wrap">
                    <svg class = "timer-ring" width = "48" height="48" viewBox ="0 0 36 36" aria-hidden = true>
                        <circle class = "ring-bg" cx = "18" cu = "18" r = "15.9"/>
                        <circle class = "ring-fill" id = "ring-fill" cx = "18" cy = "18" r = "15.9"/>
                    </svg>
                    <span class = "ring-text" id = "timer-val"> 60 </span>
                </div>
                <div class = "stat-label"> Seconds</div>>
            </div>
        </div>


        <!--Asli kaam-->

        <div class = "test-container">
            <div class = "controls" >
                <span class = "ctrl-label">Mode</span>
                <div class="chip-group">
                    <button class="chip active" data-diff="easy">Easy</button>
                    <button class="chip" data-diff="medium">Medium</button>
                    <button class="chip" data-diff="hard">Hard</button>
                    <button class="chip" data-diff="custom">Custom</button>

                </div>
                <div class="divider-v"></div>
                <span class="ctrl-label">Time</span>
                <div class="chip-group">
                    <button clas="chip" data-time="30"> 30s</button> 
                    <button class="chip active" data-time="60">60s</button>
                    <button class="chip" data-time = "120">120s</button>               
                </div>
            </div>


            <!--khud ka text aur customization-->
            <div class="custom-text-wrap" id="custom-text-wrap">
                <textarea id="custom-text-input" placeholder="Paste your own text"></textarea>
                <div class="custom-hint"> Paste a paragraph that has your weak words </div>
            </div>


            <!--passage dikhane ki jagah-->

            <div class="passage-wrap" id="passage" aria-live="polite"></div>

            <!--Type dikhane ki jagah-->
            <input type="text" id="user-input"
            placeholder="Start Typing"
            autocomplete="off" autocorrect="off"
            autocapitalize="off" spellcheck="false"/>
            <div class="input-hint" id="input-hint">Press <kbd>Tab</kbd> to restart anytime</div>
            
            <!--Action wale buttons-->

            <div class="btn-row">
                <button class="btn btn-primary" id="start-btn" >Start Test</button>
                <button class="btn btn-primary" id="'reset-btn">Reset</button>
            </div>
        </div>

        <!--score ka record-->

        <div class="history-section">
            <div class="history-title">Recent Scores</div>
            <div class="history-list" id="history-list">
                <span style="color:var(--faint); font-size: 0.8rem;">No test yet</span>
            </div>
        </div>

        <!--Result -->

        <div class="overlay" id="result-overlay" role="dialog" aria-modal="true">
            <div class="result-card">
                <div class="result-emoji"  id="result-emoji">🚀</div>
                <div class="result-title"  id="result-title">Great Job!</div>
                <div class="result-sub"    id="result-sub">Here your result</div>
        <div class="result-grid">
        <div class="result-stat">
                <div class="result-stat-val"   id="res-wpm">0</div>
                <div class="result-stat-label">WPM</div>
        </div>
      <div class="result-stat">
            <div class="result-stat-val"   id="res-acc">0%</div>
            <div class="result-stat-label">Accuracy</div>
      </div>
      <div class="result-stat">
            <div class="result-stat-val"   id="res-chars">0</div>
            <div class="result-stat-label">Chars Typed</div>
      </div>
    </div>
        <div class="result-message" id="result-message"></div>
        <div style="display:flex;gap:0.75rem;justify-content:center;">
            <button class="btn btn-primary"   id="retry-btn">↺ Try Again</button>
            <button class="btn btn-secondary" id="close-result-btn">✕ Close</button>
    </div>
  </div>
</div>
<script>

    // theme badalne ke liye 
    let isDark = true;
    document.getElementById('theme-toggle').addEventListener('click',()=>{
        isDark = !isDark;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-toggle').textContent = isDark ? '🌙' :'☀️';
    });

    // paragraphs sare ke sare

    const passages = {
  easy: [
    "The sun rises in the east and sets in the west every single day. Birds sing in the morning and the world feels fresh and new. Life is full of small joys if you take the time to notice them.",
    "A cat sat on the mat and looked at the door. The wind blew softly through the open window. It was a calm and quiet afternoon with nothing to do but rest.",
    "She opened the book and began to read the first page. The story was about a young girl who loved to explore the forest near her home. Every day she found something new and exciting."
  ],
  medium: [
    "Programming is the art of telling a computer what to do using a language it understands. Every program begins with a problem that needs solving, and the programmer must break it down into logical steps.",
    "Java is one of the most widely used programming languages in the world. It follows the principle of write once run anywhere, meaning code compiled in Java can run on any device with a Java virtual machine installed.",
    "Data structures are the building blocks of efficient software. Arrays store elements in order, linked lists connect nodes dynamically, and trees organize data hierarchically. Choosing the right structure can make the difference between fast and slow code."
  ],
  hard: [
    "Concurrency in programming refers to the execution of multiple instruction sequences at the same time. Managing shared resources between concurrent threads requires synchronization mechanisms such as mutexes, semaphores, and monitors to prevent race conditions.",
    "Cryptographic hash functions transform arbitrary input data into fixed-length output strings. Properties such as collision resistance, preimage resistance, and avalanche effect ensure that even a minor change in input produces an entirely different hash value.",
    "The time complexity of an algorithm describes how its execution time grows relative to the input size. An O(n log n) algorithm such as merge sort significantly outperforms an O(n squared) algorithm like bubble sort as the dataset size increases."
  ]
};


// sare variable

let passage ='';
let charIndex =0;
let totalChars=0;
let correctChars=0;
let started=false;
let finished=false;
let timer=null;
let timeLeft=60;
let totalTime=60;
let difficulty='easy';
let history=[];

// getElementByID waleee

const passageE1 = document.getElementById('passage');
const inputE1 = document.getElementById('user-input');
const wpmE1 = document.getElementById('wpm-val');
const accE1 = document.getElementById('acc-val');
const charsE1 = document.getElementById('chars-val');
const timerE1 = document.getElementById('timer-val');
const ringFill = document.getElementById('ring-fill');
const progressBar = document.getElementById('progress-bar');
const startbtn = document.getElementById('start-btn');
const overlay = document.getElementById('result-overlay');
const historyList = document.getElementById('history-list');
const customWrap = document.getElementById('custom-text-wrap');
const customInput = document.getElementById('custom-text-input');


//passage ke text ke liye

function getPassage(){
    if (difficulty ==='custom'){
        const t = customInput.value.trim();
        return t.length >=20 ? t: passages.easy[0];

    }
    const pool = passages[difficulty];
    return pool[Math.floor(Math.random()* pool.length)];
}

function buildPassage(){
    passage = getPassage();
    charIndex = 0; 
    totalChars = 0; 
    correctChars = 0; 
    passageE1.innerHTML = '';

    [...passage].forEach((ch,i) => {
        const span = document.createElement('span');
        span.classList.add('char','pending');
        span.dataset.index = i;
        span.textContent = ch === ' ' ? '\u00a0' : ch; 

        if (i===0) span.classList.add('cursor');
        passageE1.appendChild(span);
    });
}

function getChar(i){
    return passageE1.querySelector(`.char[data-index="${i}"]`);
}

// accuracy aur speeed calculate karne ke liye 


function calcWPM(){
    const elapsed = (totalTime - timeLeft) || 1;

    return Math.round((correctChars/5)/(elapsed/60));

}

function calcAcc(){
    if (totalChars === 0) return 100;
    return Math.round((correctChars/totalChars)* 100);
}

//updating live stats 

function updateStats(){
    wpmE1.textContent = calcWPM();
    accE1.textContent = calcAcc() + '%';
    charsE1.textContent = correctChars;

    //bar ki length changes 

    const pct = (totalChars / passage.length) * 100;
    progressBar.style.width = Math.min(pct,100) + '%';
}

// updating the timer and ring

function updateTimer(){
    timerE1.textContent = timeLeft;
    const pct = timeLeft/totalTime;

    ringFill.style.strokeDashoffset = 100 * (1-pct);

    if (pct > 0.5) ringFill.style.stroke = 'var(--yellow)';
    else if (pct > 0.25) ringFill.style.stroke = 'var(--accent)';
    else ringFill.style.stroke = 'var(--red)';
}

// timer ka countdown

function startTimer(){
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        timeLeft --;
        updateTimer();
        if(timeLeft <= 0) endTest();},1000); 
    
}

function endTest(){
    if(finished) return;
    finished = true;
    clearInterval(timer);
    inputE1.disabled = true;
    inputE1.blur();
    showResult();
}
</script>
</body>
</html>
